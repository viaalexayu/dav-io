<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>dav.io — My Bookings</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="main-content">

    <div class="page-header">
        <!-- Different title based on role -->
        <div class="page-title"
             th:text="${isAdmin} ? 'Upcoming bookings with me' : 'My bookings'">
            My bookings
        </div>
        <div class="page-sub"
             th:text="${isAdmin} ? 'People who booked a slot with you' : 'Track your appointment status'">
        </div>
    </div>

    <!-- Success alert -->
    <div class="alert alert-success" th:if="${param.success}">
        Booking submitted! Waiting for approval.
    </div>

    <!-- Empty state -->
    <div class="empty-state" th:if="${#lists.isEmpty(appointments)}">
        <p th:text="${isAdmin} ? 'No one has booked with you yet.' : 'You have no bookings yet.'"></p>
        <a th:if="${!isAdmin}" th:href="@{/}"
           style="color:var(--purple);font-size:13px;margin-top:8px;display:inline-block">
            Book an appointment →
        </a>
    </div>

    <!-- Booking cards -->
    <div th:each="appt : ${appointments}">
        <div class="booking-card">
            <div class="booking-top">
                <div>
                    <div class="booking-name"
                         th:text="${isAdmin} ? ${appt.user.username} : ${appt.slot.admin.username}">
                        Name
                    </div>
                    <div class="booking-meta">
                        <span th:text="${appt.slot.slotDate}">May 1</span>
                        ·
                        <span th:text="${appt.slot.startTime} + ' – ' + ${appt.slot.endTime}">
                    9:00 – 9:30
                </span>
                        <br/>
                        <span th:if="${appt.notes}"
                              th:text="'Notes: ' + ${appt.notes}"></span>
                    </div>
                </div>
                <span class="badge appointment-status"
                      th:data-date="${appt.slot.slotDate}"
                      th:data-start="${appt.slot.startTime}"
                      th:data-end="${appt.slot.endTime}"
                      th:data-status="${appt.status}"
                      th:classappend="${appt.status == 'CONFIRMED'} ? 'badge-confirmed' :
                              (${appt.status == 'CANCELLED'} ? 'badge-cancelled' : 'badge-pending')"
                      th:text="${appt.status}">
                    PENDING
                </span>
            </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: sidebar-script}"></div>

<script th:inline="javascript">
    function updateAppointmentStatuses() {
        const now = new Date();

        document.querySelectorAll('.appointment-status').forEach(badge => {
            const status = badge.dataset.status;

            if (status === 'CANCELLED') {
                return;
            }

            const date = badge.dataset.date;
            const startTime = badge.dataset.start;
            const endTime = badge.dataset.end;

            const startDateTime = new Date(`${date} ${startTime}`);
            const endDateTime = new Date(`${date} ${endTime}`)

            let newStatus, newClass;

            if (now < startDateTime) {
                newStatus = status;
                newClass = status === 'CONFIRMED' ? 'badge-confirmed' : 'badge-pending';
            } else if (now >= startDateTime && now <= endDateTime) {
                newStatus = 'ONGOING';
                newClass = 'badge-ongoing';
            } else {
                newStatus = 'ENDED';
                newClass = 'badge-ended';
            }

            badge.textContent = newStatus;
            badge.className = 'badge appointment-status ' + newClass;
        });
    }

    updateAppointmentStatuses();
    setInterval(updateAppointmentStatuses, 60000);
</script>
</body>
</html>
