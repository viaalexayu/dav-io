<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<div th:fragment="sidebar">
    <!-- Overlay -->
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sb-top">
            <div class="sb-logo">dav<span>.io</span></div>
            <div class="sb-user" sec:authentication="name">username</div>
        </div>
        <nav class="sb-menu">
            <a class="sb-item" th:href="@{/}"
               th:classappend="${currentPage == 'home'} ? ' active'">
                <div class="sb-icon">
                    <svg fill="none" stroke="white" stroke-width="1.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                        <polyline stroke-linecap="round" stroke-linejoin="round" points="9,22 9,12 15,12 15,22"/>
                    </svg>
                </div>
                <span class="sb-label">Home</span>
            </a>
            <a class="sb-item" th:href="@{/my-bookings}"
               th:classappend="${currentPage == 'mybookings'} ? ' active'">
                <div class="sb-icon">
                    <svg fill="none" stroke="white" stroke-width="1.5" viewBox="0 0 24 24">
                        <rect x="3" y="4" width="18" height="18" rx="2" stroke-linecap="round"/>
                        <line x1="16" y1="2" x2="16" y2="6" stroke-linecap="round"/>
                        <line x1="8" y1="2" x2="8" y2="6" stroke-linecap="round"/>
                        <line x1="3" y1="10" x2="21" y2="10" stroke-linecap="round"/>
                    </svg>
                </div>
                <span class="sb-label">My bookings</span>
            </a>
            <a class="sb-item" th:href="@{/notifications}"
               th:classappend="${currentPage == 'notifications'} ? ' active'">
                <div class="sb-icon">
                    <svg fill="none" stroke="white" stroke-width="1.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                        <path stroke-linecap="round" d="M13.73 21a2 2 0 01-3.46 0"/>
                    </svg>
                </div>
                <span class="sb-label">Notifications</span>
            </a>
            <a class="sb-item" th:href="@{/admin}"
               sec:authorize="hasRole('ADMIN')"
               th:classappend="${currentPage == 'admin'} ? ' active'">
                <div class="sb-icon">
                    <svg fill="none" stroke="white" stroke-width="1.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/>
                    </svg>
                </div>
                <span class="sb-label">Admin dashboard</span>
            </a>
        </nav>
        <div class="sb-bottom">
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="sb-logout">
                    <svg width="16" height="16" fill="none" stroke="#888" stroke-width="1.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                        <polyline stroke-linecap="round" points="16,17 21,12 16,7"/>
                        <line x1="21" y1="12" x2="9" y2="12" stroke-linecap="round"/>
                    </svg>
                    <span class="sb-logout-label">Logout</span>
                </button>
            </form>
        </div>
    </div>

    <!-- Topbar -->
    <div class="topbar">
        <button class="hamburger" id="hamburger" onclick="toggleSidebar()">
            <div class="hline"></div>
            <div class="hline"></div>
            <div class="hline"></div>
        </button>
        <div class="topbar-logo">dav<span>.io</span></div>
        <div class="topbar-right">
            <span class="role-badge" sec:authorize="hasRole('ADMIN')">Admin</span>
        </div>
    </div>
</div>

<th:block th:fragment="sidebar-script">
<script>
    function toggleSidebar() {
        const open = document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('open', open);
        document.getElementById('hamburger').classList.toggle('open', open);
    }
    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('overlay').classList.remove('open');
        document.getElementById('hamburger').classList.remove('open');
    }
</script>
</th:block>

</body>
</html>
