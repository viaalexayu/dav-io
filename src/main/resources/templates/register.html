<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>dav.io — Register</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="auth-page">
    <div class="auth-box">
        <div class="auth-logo">dav<span>.io</span></div>
        <div class="auth-tagline">Create your account to get started</div>

        <div class="auth-card">
            <p style="font-size:15px;font-weight:500;color:var(--white);margin-bottom:1.25rem">Create account</p>

            <form th:action="@{/register}" th:object="${user}" method="post">
                <div class="form-group">
                    <label class="form-label" style="color:#888">Username</label>
                    <input class="form-input form-input-dark"
                           type="text"
                           th:field="*{username}"
                           placeholder="Choose a username"
                           required/>
                </div>
                <div class="form-group">
                    <label class="form-label" style="color:#888">Password</label>
                    <input class="form-input form-input-dark"
                           type="password"
                           th:field="*{password}"
                           placeholder="Create a password"
                           required/>
                </div>
                <button type="submit" class="btn btn-primary">Create account</button>
            </form>

            <div class="auth-switch">
                Already registered? <a th:href="@{/login}">Sign in</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
